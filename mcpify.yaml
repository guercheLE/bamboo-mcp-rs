language: rust
output: .
force: true
publish_registry: true
publication:
  license: MIT
  repository: https://github.com/guercheLE/bamboo-mcp-rs
  readme: README.md
  authors: ["Luciano Evaristo Guerche (Gorše)"]
  keywords: [mcp, bamboo, cli, api]
  categories: [command-line-utilities, api-bindings]
  exclude: [/.github, /.mcpify, /docs, /scripts, /openapi, /Dockerfile, /docker-compose.yml, /.dockerignore, /.env.example, /mcpify.yaml]
auth:
  - name: personalAccessToken
    kind: pat
versions:
  - version: default
    source: https://dac-static.atlassian.com/server/bamboo/swagger.v3.json
    default: true
version_policy:
  mode: all
package_size_limit_mb: 100
